name: Test GitHub App Token

on:
  workflow_dispatch:

jobs:
  test-app-token:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/create-github-app-token@v3
        id: get_app_token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email noreply@github.com

      - name: Create test branch
        id: create_branch
        run: |
          BRANCH_NAME="test-app-token-$(date +%s)"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH_NAME"
          echo "Test commit at $(date)" >> test-file.txt
          git add test-file.txt
          git commit -m "Test commit for GitHub App token"
          git push origin "$BRANCH_NAME"

      - name: Create PR
        run: |
          gh pr create --base main --title "Test PR - GitHub App Token" --body "This is a test PR to verify GitHub App token works. Safe to close."
        env:
          GITHUB_TOKEN: ${{ steps.get_app_token.outputs.token }}

      - name: Success
        run: |
          echo "✅ GitHub App token generated successfully"
          echo "✅ Branch created: ${{ steps.create_branch.outputs.branch_name }}"
          echo "✅ PR created successfully"
          echo "Check the PR to see if CI workflows were triggered"
